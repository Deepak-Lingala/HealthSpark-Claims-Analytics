version: "3.8"

services:
  spark-master:
    image: bitnami/spark:3.5.3
    container_name: healthspark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master port
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./src:/opt/bitnami/spark/src
    networks:
      - healthspark-net

  spark-worker-1:
    image: bitnami/spark:3.5.3
    container_name: healthspark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./src:/opt/bitnami/spark/src
    networks:
      - healthspark-net

  spark-worker-2:
    image: bitnami/spark:3.5.3
    container_name: healthspark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./src:/opt/bitnami/spark/src
    networks:
      - healthspark-net

  healthspark-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthspark-api
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - MODEL_PATH=/app/data/models/readmission_model
    ports:
      - "8000:8000"   # FastAPI server
    depends_on:
      - spark-master
      - spark-worker-1
      - spark-worker-2
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    networks:
      - healthspark-net

networks:
  healthspark-net:
    driver: bridge
